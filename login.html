<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ReFood</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body class="login-body">

    <!-- CONTENEDOR -->
    <main class="login-container">

        <!-- TARJETA -->
        <section class="login-card">

            <!-- LOGO -->
            <div class="login-logo">

                <img src="https://res.cloudinary.com/dk25vjxwa/image/upload/v1778799053/Logo_mejorado_sd24nu.png"
                alt="Logo ReFood">

            </div>

            <!-- TITULO -->
            <h2>¡Bienvenido nuevamente!</h2>

            <p class="subtexto">
                Inicia sesión para acceder a tus pedidos y ofertas.
            </p>

            <!-- FORM -->
            <form action="index.html" method="get">

                <!-- CORREO -->
                <div class="input-group">

                    <label>Correo electrónico</label>

                    <input type="email"
                    placeholder="Ingrese su correo"
                    required>

                </div>

                <!-- PASSWORD -->
                <div class="input-group">

                    <label>Contraseña</label>

                    <input type="password"
                    placeholder="Ingrese su contraseña"
                    required>

                </div>

                <!-- RECORDAR -->
                <div class="recordar">

                    <input type="checkbox">

                    <span>Recordar sesión</span>

                </div>

                <!-- BOTON -->
                <button type="submit" class="btn-login">

                    Ingresar

                </button>

            </form>

            <!-- LINKS -->
            <div class="extra-links">

                <a href="recuperar.html">
                    ¿Olvidaste tu contraseña?
                </a>

                <p>
                    ¿No tienes cuenta?
                    <a href="registrar.html">
                        Regístrate
                    </a>
                </p>

            </div>

             <div class="beneficios-grid">

                <div class="beneficio">
                    🚚 Delivery rápido
                </div>

                <div class="beneficio">
                    🍔 Comida fresca
                </div>

                <div class="beneficio">
                    💸 Ofertas diarias
                </div>

             </div>

        </section>

    </main>

    <script src="js/main.js"></script>

</body>

</html>
