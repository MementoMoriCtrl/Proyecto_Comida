<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ReFood</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="registro-body">

    <!-- CONTENEDOR -->
    <main class="registro-container">

        <!-- TARJETA -->
        <section class="registro-card">

            <!-- LOGO -->
            <div class="registro-logo">

                <img src="https://res.cloudinary.com/dk25vjxwa/image/upload/v1778804678/ChatGPT_Image_14_may_2026_07_24_24_p.m._trot9d.png"
                alt="Logo ReFood">

                <p>¡Únete al cambio y ayuda a reducir el desperdicio alimentario!</p>

            </div>

            <!-- TITULO -->
            <h2>Crear cuenta</h2>

            <p class="registro-texto">
                Completa tus datos para registrarte en ReFood.
            </p>

            <!-- FORMULARIO NUEVO -->
            <form id="formRegistro">

                <!-- NOMBRE -->
                <div class="input-group">

                    <label>Nombre completo</label>

                    <input type="text"
                    id="nombre"
                    placeholder="Ingrese su nombre"
                    required>

                </div>

                <!-- CORREO -->
                <div class="input-group">

                    <label>Correo electrónico</label>

                    <input type="email"
                    id="correo"
                    placeholder="Ingrese su correo"
                    required>

                </div>

                <!-- PASSWORD -->
                <div class="input-group">

                    <label>Contraseña</label>

                    <input type="password"
                    id="password"
                    placeholder="Ingrese su contraseña"
                    required>

                </div>

                <!-- CONFIRMAR -->
                <div class="input-group">

                    <label>Confirmar contraseña</label>

                    <input type="password"
                    id="confirmarPassword"
                    placeholder="Confirme su contraseña"
                    required>

                </div>

                <!-- BOTON -->
                <button type="submit" class="btn-registro">

                    Registrarse

                </button>

            </form>

            <!-- LINK -->
            <div class="registro-links">

                <p>
                    ¿Ya tienes cuenta?
                    <a href="login.html">
                        Inicia sesión
                    </a>
                </p>

            </div>

            <!-- LOGIN SOCIAL -->

            <div class="social-login">

                <button class="social-btn">

                    <i class="fa-brands fa-google"></i>

                    Continuar con Google

                </button>

                <button class="social-btn">

                    <i class="fa-solid fa-mobile-screen-button"></i>

                    Continuar con celular

                </button>

                <button class="social-btn">

                    <i class="fa-brands fa-apple"></i>

                    Continuar con Apple

                </button>

            </div>

        </section>

    </main>

    <script src="js/main.js"></script>

</body>
</html>
